<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konatham Sreeja — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:         #080808;
    --border:     #2a2a2a;
    --gold:       #c9a96e;
    --gold-light: #e8cfa0;
    --text:       #e8e0d5;
    --muted:      #6b6560;
    --header-h:   62px;
    --next-bar-h: 52px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tenor Sans', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: var(--header-h);
    background: rgba(8,8,8,0.97);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    z-index: 10;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.1rem;
    letter-spacing: 0.14em;
    color: var(--gold-light);
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .brand em { font-style: italic; color: var(--muted); font-size: 0.85em; }

  nav { display: flex; gap: 4px; align-items: center; }
  .tab {
    position: relative;
    padding: 8px 20px;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: color .25s, border-color .25s, background .25s;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--gold);
    border-color: var(--border);
    background: rgba(201,169,110,0.06);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 20%; right: 20%;
    height: 1px;
    background: var(--gold);
  }

  /* ── VIEWER ── */
  #viewer {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* ── PANELS ── */
  .panel {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
    background: var(--bg);
  }
  .panel.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Single-frame panels (Cyber Play, Quiet Erosion) */
  .panel-single {
    overflow: hidden;
  }
  .panel-single iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ── PORTFOLIO MULTI-PART PANEL ── */
  /* Outer scroll container */
  #panel-portfolio {
    overflow-y: scroll;
    scroll-behavior: smooth;
    scroll-snap-type: y mandatory;
  }

  /*
   * Each part = iframe filling viewport + a "next" bar underneath.
   * The scroll-snap snaps to each part-block top.
   * The "next" bar sits below the iframe — when the user scrolls past
   * the iframe (by dragging the scrollbar, swiping on mobile, or clicking
   * the next-bar), the outer panel scrolls and IntersectionObserver
   * auto-snaps to the next block.
   */
  .part-block {
    /* iframe height + next-bar height = one scroll unit */
    height: calc(100vh - var(--header-h));
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  /* Last part has no next-bar */
  .part-block:last-child { height: calc(100vh - var(--header-h)); }

  .part-iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .part-iframe-wrap iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .part-iframe-wrap iframe.loaded { opacity: 1; }

  /* Part label (top-center) */
  .part-label {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(8,8,8,0.82);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    pointer-events: none;
    z-index: 2;
    white-space: nowrap;
    backdrop-filter: blur(6px);
  }

  /* ── NEXT-PART BAR ── */
  /*
   * Sits BELOW the iframe inside the same part-block flex column.
   * Clicking it scrolls to the next part. It's always visible at the
   * bottom when the user scrolls the outer panel past the iframe edge.
   * On desktop it's also accessible via the scrollbar.
   */
  .next-bar {
    flex-shrink: 0;
    height: var(--next-bar-h);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    background: #0e0e0e;
    border-top: 1px solid var(--border);
    user-select: none;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .next-bar::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(201,169,110,0.06) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0s;
  }
  .next-bar:hover::before {
    transform: translateX(100%);
    transition: transform 0.6s ease;
  }
  .next-bar:hover { background: #131313; }

  .next-bar-text {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.2s;
  }
  .next-bar:hover .next-bar-text { color: var(--gold); }

  .next-bar-arrow {
    font-size: 1rem;
    color: var(--muted);
    transition: color 0.2s, transform 0.2s;
    animation: bounce 2s ease-in-out infinite;
  }
  .next-bar:hover .next-bar-arrow {
    color: var(--gold);
    animation: none;
    transform: translateY(3px);
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(4px); }
  }

  /* Sentinel — a 1px div right above the next-bar.
     When it enters the viewport, we auto-snap to the next part. */
  .sentinel {
    height: 1px;
    width: 100%;
    pointer-events: none;
  }

  /* ── LOADING OVERLAY ── */
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 20;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  #loading-overlay.hidden { opacity: 0; }

  .loader-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.3rem;
    letter-spacing: 0.25em;
    color: var(--gold-light);
    text-transform: uppercase;
  }
  .bar-wrap {
    width: 180px; height: 1px;
    background: var(--border);
    position: relative; overflow: hidden;
  }
  .bar {
    position: absolute;
    left: -70%; top: 0; bottom: 0; width: 70%;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: sweep 1.5s ease-in-out infinite;
  }
  @keyframes sweep { 0%{left:-70%} 100%{left:110%} }
  #loader-sub {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    :root { --header-h: 54px; }
    header { padding: 0 14px; gap: 8px; }
    .brand { font-size: 0.82rem; }
    .tab { padding: 6px 10px; font-size: 0.62rem; letter-spacing: 0.1em; }
  }
  @media (max-width: 380px) {
    .tab { padding: 5px 7px; font-size: 0.57rem; }
  }

  footer {
    flex-shrink: 0;
    text-align: center;
    padding: 10px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="brand">Konatham Sreeja <em>/ Portfolio</em></div>
  <nav id="tab-nav">
    <div class="tab active" data-tab="portfolio">Portfolio</div>
    <div class="tab"        data-tab="cyberplay">Cyber Play</div>
    <div class="tab"        data-tab="erosion">Quiet Erosion</div>
  </nav>
</header>

<div id="viewer">

  <div id="loading-overlay">
    <div class="loader-title">Loading</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <div id="loader-sub">Opening document…</div>
  </div>

  <!-- ══ PORTFOLIO: 4 scroll-snapped parts ══ -->
  <div class="panel active" id="panel-portfolio">

    <!-- Part 1 -->
    <div class="part-block" id="part-1">
      <div class="part-iframe-wrap">
        <div class="part-label">Part 1 of 4</div>
        <iframe
          data-src="https://drive.google.com/file/d/1gFfeq11BT0VsBeSKQV2kX4XJYa1-Q-fB/preview"
          allow="autoplay"
        ></iframe>
      </div>
      <div class="sentinel" data-next="part-2"></div>
      <div class="next-bar" data-next="part-2">
        <span class="next-bar-text">Continue to Part 2</span>
        <span class="next-bar-arrow">↓</span>
      </div>
    </div>

    <!-- Part 2 -->
    <div class="part-block" id="part-2">
      <div class="part-iframe-wrap">
        <div class="part-label">Part 2 of 4</div>
        <iframe
          data-src="https://drive.google.com/file/d/13ZkiP1NUqZ92DYSBw9wX8gmH3ag73KQq/preview"
          allow="autoplay"
        ></iframe>
      </div>
      <div class="sentinel" data-next="part-3"></div>
      <div class="next-bar" data-next="part-3">
        <span class="next-bar-text">Continue to Part 3</span>
        <span class="next-bar-arrow">↓</span>
      </div>
    </div>

    <!-- Part 3 -->
    <div class="part-block" id="part-3">
      <div class="part-iframe-wrap">
        <div class="part-label">Part 3 of 4</div>
        <iframe
          data-src="https://drive.google.com/file/d/1rSdtPft_QASdS5xeFaWIM_joQWxizC50/preview"
          allow="autoplay"
        ></iframe>
      </div>
      <div class="sentinel" data-next="part-4"></div>
      <div class="next-bar" data-next="part-4">
        <span class="next-bar-text">Continue to Part 4</span>
        <span class="next-bar-arrow">↓</span>
      </div>
    </div>

    <!-- Part 4 (no next-bar) -->
    <div class="part-block" id="part-4">
      <div class="part-iframe-wrap">
        <div class="part-label">Part 4 of 4</div>
        <iframe
          data-src="https://drive.google.com/file/d/1SGJTY9diIIhyGtmFmObjGQp3kaaRcVIF/preview"
          allow="autoplay"
        ></iframe>
      </div>
    </div>

  </div><!-- /panel-portfolio -->


  <!-- ══ CYBER PLAY ══ -->
  <div class="panel panel-single" id="panel-cyberplay">
    <iframe
      data-src="https://drive.google.com/file/d/13Gh3KXCxzmxQj5xFlYdsy-O00gpGxidY/preview"
      allow="autoplay"
    ></iframe>
  </div>


  <!-- ══ QUIET EROSION ══ -->
  <div class="panel panel-single" id="panel-erosion">
    <iframe
      data-src="https://drive.google.com/file/d/1LAsf4gR3PNsLqjAzO98kN_yRQSOI0DeV/preview"
      allow="autoplay"
    ></iframe>
  </div>

</div><!-- /viewer -->

<footer>Konatham Sreeja &nbsp;·&nbsp; Design Portfolio &nbsp;·&nbsp; All Rights Reserved</footer>

<script>
  const overlay    = document.getElementById('loading-overlay');
  const loaderSub  = document.getElementById('loader-sub');
  const tabs       = document.querySelectorAll('.tab');
  const panels     = document.querySelectorAll('.panel');
  const portfolio  = document.getElementById('panel-portfolio');

  // ── Helpers ──
  function loadIframe(iframe) {
    if (iframe && (!iframe.src || iframe.src === window.location.href)) {
      iframe.src = iframe.dataset.src;
    }
  }

  function showLoader(iframe) {
    overlay.classList.remove('hidden');
    loaderSub.textContent = 'Opening document…';
    iframe.addEventListener('load', () => {
      overlay.classList.add('hidden');
      iframe.classList.add('loaded');
    }, { once: true });
  }

  // ── Scroll-snap to a part by ID ──
  function goToPart(id) {
    const target = document.getElementById(id);
    if (!target) return;

    // Load iframe lazily if not yet loaded
    const iframe = target.querySelector('iframe');
    if (iframe && (!iframe.src || iframe.src === window.location.href)) {
      showLoader(iframe);
      loadIframe(iframe);
    }

    // Scroll the portfolio panel to the target part
    portfolio.scrollTo({ top: target.offsetTop, behavior: 'smooth' });
  }

  // ── "Continue to Part X" bar clicks ──
  document.querySelectorAll('.next-bar').forEach(bar => {
    bar.addEventListener('click', () => goToPart(bar.dataset.next));
  });

  // ── Sentinel IntersectionObserver:
  //    When sentinel enters view (user scrolled outer panel near
  //    the bottom of a part), auto-advance to next part.
  const sentinelIO = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        goToPart(entry.target.dataset.next);
      }
    });
  }, { root: portfolio, threshold: 1.0 });

  document.querySelectorAll('.sentinel').forEach(s => sentinelIO.observe(s));

  // ── Lazy-load next part when current part's iframe loads ──
  //    (pre-fetch so next part is ready when user advances)
  portfolio.querySelectorAll('.part-block').forEach((block, idx, all) => {
    const iframe = block.querySelector('iframe');
    if (!iframe) return;
    iframe.addEventListener('load', () => {
      const next = all[idx + 1];
      if (next) {
        const nextIframe = next.querySelector('iframe');
        // Small delay so current part renders first
        setTimeout(() => loadIframe(nextIframe), 1500);
      }
    }, { once: true });
  });

  // ── Activate a panel (used for tab switching) ──
  function activatePanel(panel) {
    const iframe = panel.querySelector('iframe');
    if (!iframe) return;
    if (!iframe.src || iframe.src === window.location.href) {
      showLoader(iframe);
      loadIframe(iframe);
    }
  }

  // ── Tab switching ──
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const id = tab.dataset.tab;
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      panels.forEach(p => p.classList.remove('active'));
      const target = document.getElementById(`panel-${id}`);
      target.classList.add('active');

      // Reset portfolio scroll to top when re-entering
      if (id === 'portfolio') portfolio.scrollTo({ top: 0 });
      else activatePanel(target);
    });
  });

  // ── Boot: load Part 1 ──
  const firstIframe = document.querySelector('#part-1 iframe');
  showLoader(firstIframe);
  loadIframe(firstIframe);
</script>
</body>
</html>
