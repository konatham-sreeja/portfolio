<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konatham Sreeja — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:         #080808;
    --border:     #2a2a2a;
    --gold:       #c9a96e;
    --gold-light: #e8cfa0;
    --text:       #e8e0d5;
    --muted:      #6b6560;
    --header-h:   62px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tenor Sans', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: var(--header-h);
    background: rgba(8,8,8,0.97);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    z-index: 100;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.1rem;
    letter-spacing: 0.14em;
    color: var(--gold-light);
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .brand em { font-style: italic; color: var(--muted); font-size: 0.85em; }

  nav { display: flex; gap: 4px; }
  .tab {
    position: relative;
    padding: 8px 20px;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: color .2s, border-color .2s, background .2s;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--gold);
    border-color: var(--border);
    background: rgba(201,169,110,0.06);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 20%; right: 20%;
    height: 1px;
    background: var(--gold);
  }

  /* ── VIEWER ── */
  #viewer {
    flex: 1;
    position: relative;
    overflow: hidden;
    /* exact height so children can use 100% */
    height: calc(100vh - var(--header-h));
  }

  /* ── PANELS ── */
  .panel {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .panel.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Single panels */
  .panel-single iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ── PORTFOLIO PANEL ──
     Scrolls vertically, snaps each part to fill the viewer exactly.
  */
  #panel-portfolio {
    overflow-y: scroll;
    overflow-x: hidden;
    scroll-snap-type: y mandatory;
    /* hide scrollbar visually but keep it functional */
    scrollbar-width: none;
  }
  #panel-portfolio::-webkit-scrollbar { display: none; }

  /* Each part snaps to fill viewer 100% — no more, no less */
  .part-block {
    /* Exactly the viewer height = clean snap every time */
    height: calc(100vh - var(--header-h));
    width: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* iframe fills the whole part-block */
  .part-block iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .part-block iframe.loaded { opacity: 1; }

  /* ── PART LABEL (top-center) ── */
  .part-label {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: rgba(8,8,8,0.85);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 5;
    white-space: nowrap;
    backdrop-filter: blur(8px);
    pointer-events: none;
  }

  /* ── NEXT BUTTON (bottom-center, overlaid on iframe) ──
     Absolutely positioned INSIDE part-block so it never
     adds any height — zero layout impact.
  */
  .next-btn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    background: rgba(8,8,8,0.88);
    border: 1px solid var(--border);
    border-radius: 30px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    user-select: none;
    white-space: nowrap;
  }
  .next-btn:hover {
    background: rgba(201,169,110,0.12);
    border-color: var(--gold);
    transform: translateX(-50%) translateY(-2px);
  }
  .next-btn-text {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.2s;
  }
  .next-btn:hover .next-btn-text { color: var(--gold); }

  .next-btn-arrow {
    color: var(--muted);
    font-size: 0.9rem;
    transition: color 0.2s;
    animation: nudge 2s ease-in-out infinite;
  }
  .next-btn:hover .next-btn-arrow {
    color: var(--gold);
    animation: none;
  }
  @keyframes nudge {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(3px); }
  }

  /* ── LOADING OVERLAY ── */
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 50;
    transition: opacity 0.5s;
  }
  #loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loader-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.3rem;
    letter-spacing: 0.25em;
    color: var(--gold-light);
    text-transform: uppercase;
  }
  .bar-wrap {
    width: 180px; height: 1px;
    background: var(--border);
    position: relative; overflow: hidden;
  }
  .bar {
    position: absolute;
    left: -70%; top: 0; bottom: 0; width: 70%;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: sweep 1.5s ease-in-out infinite;
  }
  @keyframes sweep { 0%{left:-70%} 100%{left:110%} }
  #loader-sub {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    :root { --header-h: 54px; }
    header { padding: 0 14px; gap: 8px; }
    .brand { font-size: 0.82rem; }
    .tab { padding: 6px 10px; font-size: 0.62rem; letter-spacing: 0.1em; }
    .next-btn { padding: 8px 18px; }
  }
  @media (max-width: 380px) {
    .tab { padding: 5px 7px; font-size: 0.57rem; }
  }

  footer {
    flex-shrink: 0;
    text-align: center;
    padding: 10px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="brand">Konatham Sreeja <em>/ Portfolio</em></div>
  <nav id="tab-nav">
    <div class="tab active" data-tab="portfolio">Portfolio</div>
    <div class="tab"        data-tab="cyberplay">Cyber Play</div>
    <div class="tab"        data-tab="erosion">Quiet Erosion</div>
  </nav>
</header>

<div id="viewer">

  <div id="loading-overlay">
    <div class="loader-title">Loading</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <div id="loader-sub">Opening document…</div>
  </div>

  <!-- ══ PORTFOLIO ══ -->
  <div class="panel active" id="panel-portfolio">

    <div class="part-block" id="part-1">
      <span class="part-label">Part 1 of 4</span>
      <iframe data-src="https://drive.google.com/file/d/1gFfeq11BT0VsBeSKQV2kX4XJYa1-Q-fB/preview" allow="autoplay"></iframe>
      <div class="next-btn" data-next="part-2">
        <span class="next-btn-text">Continue · Part 2</span>
        <span class="next-btn-arrow">↓</span>
      </div>
    </div>

    <div class="part-block" id="part-2">
      <span class="part-label">Part 2 of 4</span>
      <iframe data-src="https://drive.google.com/file/d/13ZkiP1NUqZ92DYSBw9wX8gmH3ag73KQq/preview" allow="autoplay"></iframe>
      <div class="next-btn" data-next="part-3">
        <span class="next-btn-text">Continue · Part 3</span>
        <span class="next-btn-arrow">↓</span>
      </div>
    </div>

    <div class="part-block" id="part-3">
      <span class="part-label">Part 3 of 4</span>
      <iframe data-src="https://drive.google.com/file/d/1rSdtPft_QASdS5xeFaWIM_joQWxizC50/preview" allow="autoplay"></iframe>
      <div class="next-btn" data-next="part-4">
        <span class="next-btn-text">Continue · Part 4</span>
        <span class="next-btn-arrow">↓</span>
      </div>
    </div>

    <div class="part-block" id="part-4">
      <span class="part-label">Part 4 of 4</span>
      <iframe data-src="https://drive.google.com/file/d/1SGJTY9diIIhyGtmFmObjGQp3kaaRcVIF/preview" allow="autoplay"></iframe>
      <!-- no next-btn on last part -->
    </div>

  </div>

  <!-- ══ CYBER PLAY ══ -->
  <div class="panel panel-single" id="panel-cyberplay">
    <iframe data-src="https://drive.google.com/file/d/13Gh3KXCxzmxQj5xFlYdsy-O00gpGxidY/preview" allow="autoplay"></iframe>
  </div>

  <!-- ══ QUIET EROSION ══ -->
  <div class="panel panel-single" id="panel-erosion">
    <iframe data-src="https://drive.google.com/file/d/1LAsf4gR3PNsLqjAzO98kN_yRQSOI0DeV/preview" allow="autoplay"></iframe>
  </div>

</div>

<footer>Konatham Sreeja &nbsp;·&nbsp; Design Portfolio &nbsp;·&nbsp; All Rights Reserved</footer>

<script>
  const overlay   = document.getElementById('loading-overlay');
  const loaderSub = document.getElementById('loader-sub');
  const portfolio = document.getElementById('panel-portfolio');

  // ── Load an iframe ──
  function loadIframe(iframe) {
    if (iframe && (!iframe.src || iframe.src === window.location.href)) {
      iframe.src = iframe.dataset.src;
    }
  }

  function showLoader(iframe) {
    overlay.classList.remove('hidden');
    loaderSub.textContent = 'Opening document…';
    iframe.addEventListener('load', () => {
      overlay.classList.add('hidden');
      iframe.classList.add('loaded');
    }, { once: true });
  }

  // ── Snap to a part block ──
  function goToPart(id) {
    const block = document.getElementById(id);
    if (!block) return;

    // Load iframe if not yet
    const iframe = block.querySelector('iframe');
    if (iframe && (!iframe.src || iframe.src === window.location.href)) {
      showLoader(iframe);
      loadIframe(iframe);
    }

    // Scroll the portfolio panel — scroll-snap does the clean clip
    portfolio.scrollTo({ top: block.offsetTop, behavior: 'smooth' });
  }

  // ── Next-btn clicks ──
  document.querySelectorAll('.next-btn').forEach(btn => {
    btn.addEventListener('click', () => goToPart(btn.dataset.next));
  });

  // ── Pre-fetch next part after current loads ──
  document.querySelectorAll('.part-block').forEach((block, i, all) => {
    block.querySelector('iframe').addEventListener('load', () => {
      const next = all[i + 1];
      if (next) setTimeout(() => loadIframe(next.querySelector('iframe')), 1200);
    }, { once: true });
  });

  // ── Tab switching ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const id = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

      const target = document.getElementById(`panel-${id}`);
      target.classList.add('active');

      if (id === 'portfolio') {
        portfolio.scrollTo({ top: 0, behavior: 'instant' });
      } else {
        const iframe = target.querySelector('iframe');
        if (iframe && (!iframe.src || iframe.src === window.location.href)) {
          showLoader(iframe);
          loadIframe(iframe);
        }
      }
    });
  });

  // ── Boot: load Part 1 ──
  const part1Frame = document.querySelector('#part-1 iframe');
  showLoader(part1Frame);
  loadIframe(part1Frame);
</script>
</body>
</html>
