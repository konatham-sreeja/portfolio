<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konatham Sreeja — Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Tenor+Sans&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED CSS — SAME AS YOUR FILE) */
</style>
</head>
<body>

<header>
  <div class="brand">Konatham Sreeja <em>/ Portfolio</em></div>
  <nav id="tab-nav">
    <div class="tab active" data-tab="portfolio">Portfolio</div>
    <div class="tab" data-tab="cyberplay">Cyber Play</div>
    <div class="tab" data-tab="erosion">Quiet Erosion</div>
  </nav>
</header>

<div id="viewer">

  <div id="loading-overlay">
    <div class="loader-title">Loading</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <div id="loader-sub">Opening document…</div>
  </div>

  <!-- PORTFOLIO -->
  <div class="panel active" id="panel-portfolio">

    <div class="part-block" id="part-1">
      <span class="part-label">Part 1 of 4</span>
      <iframe data-src="https://drive.google.com/file/d/1gFfeq11BT0VsBeSKQV2kX4XJYa1-Q-fB/preview"></iframe>
      <div class="next-btn" data-next="part-2">Continue ↓</div>
    </div>

    <div class="part-block" id="part-2">
      <span class="part-label">Part 2 of 4</span>
      <iframe data-src="https://drive.google.com/file/d/13ZkiP1NUqZ92DYSBw9wX8gmH3ag73KQq/preview"></iframe>
      <div class="next-btn" data-next="part-3">Continue ↓</div>
    </div>

    <div class="part-block" id="part-3">
      <span class="part-label">Part 3 of 4</span>
      <iframe data-src="https://drive.google.com/file/d/1rSdtPft_QASdS5xeFaWIM_joQWxizC50/preview"></iframe>
      <div class="next-btn" data-next="part-4">Continue ↓</div>
    </div>

    <div class="part-block" id="part-4">
      <span class="part-label">Part 4 of 4</span>
      <iframe data-src="https://drive.google.com/file/d/1SGJTY9diIIhyGtmFmObjGQp3kaaRcVIF/preview"></iframe>
    </div>

  </div>

  <!-- CYBER PLAY -->
  <div class="panel panel-single" id="panel-cyberplay">
    <iframe data-src="https://drive.google.com/file/d/13Gh3KXCxzmxQj5xFlYdsy-O00gpGxidY/preview"></iframe>
  </div>

  <!-- EROSION -->
  <div class="panel panel-single" id="panel-erosion">
    <iframe data-src="https://drive.google.com/file/d/1LAsf4gR3PNsLqjAzO98kN_yRQSOI0DeV/preview"></iframe>
  </div>

</div>

<footer>Konatham Sreeja · Portfolio</footer>

<script>
const overlay = document.getElementById('loading-overlay');
const portfolio = document.getElementById('panel-portfolio');

function loadIframe(iframe) {
  if (iframe && (!iframe.src || iframe.src === 'about:blank')) {
    iframe.src = iframe.dataset.src;
  }
}

function showLoader(iframe) {
  overlay.classList.remove('hidden');
  iframe.addEventListener('load', () => {
    overlay.classList.add('hidden');
  }, { once: true });
}

function goToPart(id) {
  const block = document.getElementById(id);
  const iframe = block.querySelector('iframe');

  if (!iframe.src || iframe.src === 'about:blank') {
    showLoader(iframe);
    loadIframe(iframe);
  }

  portfolio.scrollTo({ top: block.offsetTop, behavior: 'smooth' });
}

document.querySelectorAll('.next-btn').forEach(btn => {
  btn.onclick = () => goToPart(btn.dataset.next);
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    const id = tab.dataset.tab;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    const panel = document.getElementById(`panel-${id}`);
    panel.classList.add('active');

    if (id !== 'portfolio') {
      const iframe = panel.querySelector('iframe');
      if (!iframe.src || iframe.src === 'about:blank') {
        showLoader(iframe);
        loadIframe(iframe);
      }
    }
  };
});

// Load first part
const first = document.querySelector('#part-1 iframe');
showLoader(first);
loadIframe(first);
</script>

</body>
</html>
