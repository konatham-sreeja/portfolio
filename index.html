<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konatham Sreeja — Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Tenor+Sans&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#080808;
  --border:#2a2a2a;
  --gold:#c9a96e;
  --text:#e8e0d5;
  --muted:#6b6560;
  --header-h:62px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Tenor Sans',sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* HEADER */
header{
  height:var(--header-h);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid var(--border);
}
.tab{cursor:pointer;color:var(--muted);padding:8px 16px}
.tab.active{color:var(--gold)}

/* VIEWER */
#viewer{
  flex:1;
  position:relative;
}

/* PANELS */
.panel{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
}
.panel.active{
  opacity:1;
  pointer-events:auto;
}

/* ✅ PORTFOLIO IMAGE STYLE */
#portfolio-images{
  overflow-y:auto;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#portfolio-images img{
  width:100%;
  max-width:900px;
  height:auto;
}

/* PDF iframe panels */
.panel iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<header>
  <div>Konatham Sreeja</div>
  <div>
    <span class="tab active" data-tab="portfolio">Portfolio</span>
    <span class="tab" data-tab="cyberplay">Cyber Play</span>
    <span class="tab" data-tab="erosion">Quiet Erosion</span>
  </div>
</header>

<div id="viewer">

  <!-- ✅ PORTFOLIO (IMAGES) -->
  <div class="panel active" id="panel-portfolio">
    <div id="portfolio-images"></div>
  </div>

  <!-- ✅ PDF SECTIONS -->
  <div class="panel" id="panel-cyberplay">
    <iframe data-src="https://drive.google.com/file/d/13Gh3KXCxzmxQj5xFlYdsy-O00gpGxidY/preview"></iframe>
  </div>

  <div class="panel" id="panel-erosion">
    <iframe data-src="https://drive.google.com/file/d/1LAsf4gR3PNsLqjAzO98kN_yRQSOI0DeV/preview"></iframe>
  </div>

</div>

<script>
/* ---------- PORTFOLIO IMAGE LOADER ---------- */
const container = document.getElementById("portfolio-images");

// 🔥 CHANGE THIS IF NEEDED
const totalPages = 52;

for (let i = 1; i <= totalPages; i++) {
  const img = document.createElement("img");

  // ⚠️ match your filename exactly
  img.src = `Konatham Sreeja final portfolio -${i}.png`;

  container.appendChild(img);
}

/* ---------- TAB SWITCHING ---------- */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    const id = tab.dataset.tab;

    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');

    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));

    const panel = document.getElementById(`panel-${id}`);
    panel.classList.add('active');

    // load iframe only when needed
    if(id!=="portfolio"){
      const iframe = panel.querySelector("iframe");
      if(iframe && (!iframe.src || iframe.src==="about:blank")){
        iframe.src = iframe.dataset.src;
      }
    }
  };
});
</script>

</body>
</html>
